[pytest]
# tests/ is the pytest suite (see README.md / docs/ARCHITECTURE.md) -- network-free by
# design. Without this, bare `pytest` also matches ops/*_test.py (smoke_test.py,
# mt5_smoke_test.py, ctrader_smoke_test.py, live_order_test.py), which are manual/live
# network scripts, not unit tests, and happen to define functions named test_* too.
testpaths = tests
