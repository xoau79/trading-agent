<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#07090F">
<title>Trading Agent — Console</title>
<link rel="preload" href="fonts/SpaceGrotesk-600.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/Inter-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/app.css">
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;rect width='32' height='32' rx='8' fill='%230E1219'/&gt;&lt;path d='M7 21 13 14l4 4 8-9' stroke='%235585E3' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/&gt;&lt;/svg&gt;">
</head>
<body>
<div class="backdrop" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" width="26" height="26"><path d="M6 22 13 14l4.5 4.5L26 8.5" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">TRADING&nbsp;AGENT</span>
      <span class="brand-sub" id="brandSub">paper account</span>
    </div>
  </div>
  <div class="topbar-session" id="topSession"></div>
  <div class="topbar-spacer"></div>
  <div class="topbar-fresh" id="dataFresh" title="Age of the latest data snapshot"></div>
  <div class="topbar-clock">
    <span class="clock-time" id="clockTime">--:--:--</span>
    <span class="clock-zone" id="clockZone">Sydney</span>
  </div>
  <div id="wakeSlot"></div>
</header>

<div id="banners"></div>

<main class="grid" id="app">
  <!-- Row: hero + live market -->
  <div class="col-left">
    <section class="card hero-card reveal" id="hero" aria-label="Current capital"></section>
    <section class="card reveal" id="positions" aria-label="Open positions"></section>
  </div>
  <section class="card market-card reveal" id="market" aria-label="Live market chart"></section>

  <!-- Row: metrics panel -->
  <section class="card reveal span-12" id="metrics" aria-label="Performance metrics"></section>

  <!-- Row: equity + agent activity -->
  <div class="col-mid">
    <section class="card reveal" id="equity" aria-label="Equity curve"></section>
    <div class="perf-row">
      <section class="card reveal" id="dailyPnl" aria-label="Daily profit and loss"></section>
      <section class="card reveal" id="rDist" aria-label="R-multiple distribution"></section>
      <section class="card reveal" id="breakdown" aria-label="Performance breakdown"></section>
    </div>
  </div>
  <section class="card agent-card reveal" id="agent" aria-label="Agent activity"></section>

  <!-- Row: suggestions + market intel -->
  <section class="card reveal span-6" id="suggest" aria-label="Suggestions and refinements"></section>
  <section class="card reveal span-6" id="intel" aria-label="News and headlines"></section>

  <!-- Row: backtest lab -->
  <section class="card reveal span-12" id="lab" aria-label="Backtest lab"></section>

  <!-- Row: archive + lessons -->
  <section class="card reveal span-8" id="archive" aria-label="Trade archive"></section>
  <section class="card reveal span-4" id="lessons" aria-label="Lessons learned"></section>
</main>

<footer class="footer" id="footer"></footer>

<div class="chart-tip" id="chartTip" role="tooltip" hidden></div>

<script src="js/util.js"></script>
<script src="js/charts.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
</body>
</html>
